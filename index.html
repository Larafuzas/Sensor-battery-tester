<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BatSense">
    
    <title>BatSense v1.4</title>

    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        /* Área de Información */
        #sensor-info {
            margin-bottom: 3rem;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0.3; /* Estado inicial atenuado */
            transform: translateY(10px);
        }

        #sensor-info.active {
            opacity: 1;
            transform: translateY(0);
        }

        .status-tag {
            display: inline-block;
            padding: 5px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        h1 { font-weight: 600; font-size: 1.8rem; margin: 0 0 8px 0; letter-spacing: -0.5px; }
        #device-desc { color: var(--text-dim); font-size: 0.95rem; line-height: 1.4; padding: 0 20px; }

        /* Representación Gráfica de Batería */
        .battery-shell {
            width: 100%;
            height: 50px;
            background: #151515;
            border-radius: 12px;
            margin: 2.5rem 0;
            position: relative;
            border: 1px solid #222;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        #battery-bar {
            height: 100%;
            width: 0%;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.8s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        #battery-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            mix-blend-mode: difference; /* Asegura legibilidad sobre cualquier color */
        }

        /* Botón de Acción */
        #connect-btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 18px 40px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #connect-btn:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        #connect-btn.connected {
            background: transparent;
            color: #444;
            border: 1px solid #222;
        }

    </style>
</head>
<body>

    <div class="container">
        <div id="sensor-info">
            <div id="sensor-tag" class="status-tag">Desconectado</div>
            <h1 id="device-name">BatSense</h1>
            <p id="device-desc">Listo para escanear sensores cercanos.</p>
            
            <div class="battery-shell">
                <div id="battery-bar"></div>
                <div id="battery-text">--%</div>
            </div>
        </div>

        <button id="connect-btn">Vincular Sensor</button>
    </div>

    <script>
        const connectBtn = document.getElementById('connect-btn');
        const batteryBar = document.getElementById('battery-bar');
        const batteryText = document.getElementById('battery-text');
        const deviceName = document.getElementById('device-name');
        const sensorTag = document.getElementById('sensor-tag');
        const deviceDesc = document.getElementById('device-desc');
        const infoContainer = document.getElementById('sensor-info');

        async function initBluetooth() {
            try {
                // Filtramos por servicio de batería estándar
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['battery_service'] }]
                });

                // UI al conectar
                infoContainer.classList.add('active');
                deviceName.innerText = device.name || "Sensor Identificado";
                connectBtn.innerText = "Conectado";
                connectBtn.classList.add('connected');
                
                // Análisis simple del tipo de sensor
                const name = device.name.toLowerCase();
                if(name.includes('hrm') || name.includes('heart')) {
                    sensorTag.innerText = "Monitor Cardíaco";
                    deviceDesc.innerText = "Transfiriendo telemetría de salud y energía.";
                } else {
                    sensorTag.innerText = "Sensor BLE";
                    deviceDesc.innerText = "Sincronización de batería activa.";
                }

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('battery_service');
                const characteristic = await service.getCharacteristic('battery_level');

                // Lectura inicial
                const value = await characteristic.readValue();
                updateUI(value.getUint8(0));

                // Suscripción a cambios en tiempo real
                characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    updateUI(e.target.value.getUint8(0));
                });

                // Manejo de desconexión
                device.addEventListener('gattserverdisconnected', () => {
                    resetUI();
                });

            } catch (error) {
                console.error("Error:", error);
                alert("Conexión cancelada o error de emparejamiento.");
            }
        }

        function updateUI(level) {
            batteryText.innerText = level + "%";
            batteryBar.style.width = level + "%";

            // Lógica cromática profesional
            if (level > 60) {
                batteryBar.style.backgroundColor = "#22c55e"; // Verde éxito
            } else if (level > 20) {
                batteryBar.style.backgroundColor = "#f59e0b"; // Ámbar aviso
            } else {
                batteryBar.style.backgroundColor = "#ef4444"; // Rojo crítico
                // Haptic feedback simulado para iOS si bajamos de 20%
                if (window.navigator.vibrate) window.navigator.vibrate(200);
            }
        }

        function resetUI() {
            infoContainer.classList.remove('active');
            deviceName.innerText = "BatSense";
            sensorTag.innerText = "Desconectado";
            deviceDesc.innerText = "El sensor se ha desconectado.";
            batteryBar.style.width = "0%";
            batteryText.innerText = "--%";
            connectBtn.innerText = "Reconectar Sensor";
            connectBtn.classList.remove('connected');
        }

        connectBtn.addEventListener('click', initBluetooth);
    </script>
</body>
</html>
